<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedPoint - Pro Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sp-red: #E50914; 
            --row-bg: rgba(15, 15, 15, 0.95); 
            --row-border: #2a2a2a;
            --text-white: #ffffff;
            --text-grey: #888888;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--text-white);
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('leaderboard_bg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: blur(7px);
        }

        .bg-dimmer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container {
            width: 85%;
            max-width: 1800px;
            margin: 50px auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--sp-red);
            padding-bottom: 15px;
        }
        
        .header h1 {
            font-family: 'Teko', sans-serif;
            font-size: 5rem;
            line-height: 0.8;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header h1 span {
            color: var(--sp-red);
        }

        .header p {
            font-size: 2rem; /* Başlığı biraz daha belirgin yaptık */
            color: var(--text-grey);
            margin: 5px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .logo-area img {
            height: 80px; 
        }

        .board {
            width: 100%;
            border-collapse: separate; 
            border-spacing: 0 8px; 
        }

        .board thead th {
            text-align: left;
            font-size: 1.2rem;
            color: var(--text-grey);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 20px 10px 20px;
            font-weight: 600;
        }

        .board tbody tr {
            background-color: var(--row-bg);
            border-left: 6px solid var(--sp-red); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .board tbody td {
            padding: 15px 20px;
            vertical-align: middle;
            border-top: 1px solid var(--row-border);
            border-bottom: 1px solid var(--row-border);
        }

        .board tbody td:last-child {
            border-right: 1px solid var(--row-border);
        }

        .rank {
            width: 60px;
            font-family: 'Teko', sans-serif;
            font-size: 3.5rem !important;
            color: var(--text-white);
            text-align: center;
            line-height: 1;
        }

        .driver-name {
            font-size: 2rem !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 30%;
        }

        .details-cell {
            font-size: 1.3rem !important;
            color: var(--text-grey);
            text-transform: uppercase;
        }

        .car-name {
            color: #ccc;
            font-weight: 600;
            margin-right: 15px;
            display: inline-block;
            max-width: 350px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
        }

        .time-cell {
            font-family: 'Teko', sans-serif;
            color: var(--text-white);
            font-size: 3.5rem !important;
            text-align: right;
            line-height: 1;
            letter-spacing: 2px;
        }

        .row-1 {
            border-left: 6px solid #FFD700 !important;
        }
        .row-1 .time-cell {
            color: #00FF88; 
        }

        tbody tr {
            animation: blockIn 0.4s ease-out forwards;
            opacity: 0;
            transform: scale(0.98);
        }

        @keyframes blockIn {
            to { opacity: var(--target-opacity, 1); transform: scale(1); }
        }
        
        @keyframes pulse-glow {
            0% { opacity: 0.3; text-shadow: 0 0 5px rgba(229, 9, 20, 0); }
            50% { opacity: 1; text-shadow: 0 0 30px rgba(229, 9, 20, 0.8); }
            100% { opacity: 0.3; text-shadow: 0 0 5px rgba(229, 9, 20, 0); }
        }
        
        .no-data-anim {
            text-align: center;
            color: var(--sp-red);
            padding: 60px;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            animation: pulse-glow 2s infinite ease-in-out;
        }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="bg-dimmer"></div>

    <div class="container">
        <div class="header">
            <div>
                <h1><span>LEADERBOARD</span></h1>
                <p id="currentTrackTitle">ALL TRACKS</p>
            </div>
            
            <div class="logo-area">
                <img src="splogo.png" alt="" onerror="this.style.display='none'">
            </div>
        </div>

        <table class="board">
            <thead>
                <tr>
                    <th style="text-align: center;">POS</th>
                    <th>DRIVER</th>
                    <th>VEHICLE / TRACK</th>
                    <th style="text-align: right;">BEST LAP</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="4" class="no-data-anim">NO DATA</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // 💡 YENİ: doc fonksiyonunu ekledik (Ayarları dinlemek için)
        import { getFirestore, collection, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "speedpoint-928e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allRecords = []; 
        let currentAdminTrack = "ALL"; // Varsayılan olarak tüm pistleri göster
        
        const MAX_DISPLAY_COUNT = 10;

        const carDefinitions = {
            "KS_FERRARI_488_GT3": "Ferrari 488 GT3",
            "KS_MERCEDES_AMG_GT3": "Mercedes-AMG GT3",
            "KS_LAMBORGHINI_HURACAN_GT3": "Lamborghini Huracan GT3",
            "KS_PORSCHE_911_GT3_R_2016": "Porsche 911 GT3 R",
            "KS_AUDI_R8_LMS": "Audi R8 LMS",
            "KS_BMW_M4_GT3": "BMW M4 GT3",
            "KS_MCLAREN_650S_GT3": "McLaren 650S GT3",
            "KS_NISSAN_GTR_GT3": "Nissan GT-R GT3",
            "KS_TOYOTA_GT86": "Toyota GT86"
        };

        function formatCarName(rawName) {
            if (!rawName) return "UNKNOWN";
            if (carDefinitions[rawName]) return carDefinitions[rawName];
            return rawName.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
        }

        const trackDefinitions = {
            "ks_monza": "Monza",
            "ks_silverstone": "Silverstone",
            "ks_spa": "Spa-Francorchamps",
            "ks_nurburgring": "Nürburgring GP",
            "ks_barcelona": "Barcelona",
            "ks_brands_hatch": "Brands Hatch",
            "ks_mugello": "Mugello",
            "ks_laguna_seca": "Laguna Seca",
            "ks_zandvoort": "Zandvoort",
            "ks_imola": "Imola",
            "ks_red_bull_ring": "Red Bull Ring"
        };

        function formatTrackName(rawName) {
            if (!rawName) return "TRACK";
            if (trackDefinitions[rawName.toLowerCase()]) return trackDefinitions[rawName.toLowerCase()];
            return rawName.replace(/^ks_/i, '').replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
        }

        function timeToMs(timeStr) {
            if (!timeStr || timeStr === "0" || timeStr === "--:--.---") return Infinity;
            try {
                let parts = timeStr.split(':');
                let mins = parseInt(parts[0]) || 0;
                let secsMs = parts[1].split('.');
                let secs = parseInt(secsMs[0]) || 0;
                let ms = parseInt(secsMs[1]) || 0;
                return (mins * 60000) + (secs * 1000) + ms;
            } catch (e) { return Infinity; }
        }

        function renderTable(records) {
            const tbody = document.getElementById("leaderboard-body");
            tbody.innerHTML = "";

            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="no-data-anim">NO DATA</td></tr>`;
                return;
            }

            records.forEach((record, index) => {
                const rank = index + 1;
                let delay = index * 0.05;

                const tr = document.createElement("tr");
                tr.className = `row-${rank}`;
                tr.style.animationDelay = `${delay}s`;

                if (index >= 3) {
                    const opacity = Math.max(0.25, 1 - (index - 2) * 0.15);
                    tr.style.setProperty('--target-opacity', opacity);
                }

                tr.innerHTML = `
                    <td class="rank">${rank}</td>
                    <td class="driver-name">${record.userName}</td>
                    <td class="details-cell">
                        <span class="car-name">${record.carFormatted}</span>
                        <span>// ${record.trackFormatted}</span>
                    </td>
                    <td class="time-cell">${record.bestTime}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 💡 YENİ: Ekranı Filtreleme Mantığı (Admin verisine göre)
        function applyFilterAndRender() {
            let filteredRecords = [];
            const titleEl = document.getElementById("currentTrackTitle");
            
            if (currentAdminTrack === "ALL") {
                titleEl.textContent = "ALL TRACKS";
                titleEl.style.color = "var(--text-grey)";
                filteredRecords = [...allRecords];
            } else {
                // TV ekranında filtrelenen pistin güzel adını yazalım
                titleEl.textContent = formatTrackName(currentAdminTrack).toUpperCase(); 
                titleEl.style.color = "var(--sp-red)";
                
                // Kayıtları, adminin seçtiği ham oyun koduyla (rawTrack) eşleştir
                filteredRecords = allRecords.filter(r => r.rawTrack.toLowerCase() === currentAdminTrack.toLowerCase());
            }

            filteredRecords.sort((a, b) => a.timeMs - b.timeMs);
            renderTable(filteredRecords.slice(0, MAX_DISPLAY_COUNT)); 
        }

        // 📡 1. DİNLEYİCİ: REKORLAR (Leaderboard)
        const leaderboardRef = collection(db, "leaderboard");
        onSnapshot(leaderboardRef, (snapshot) => {
            let uniqueMap = new Map();

            snapshot.forEach((doc) => {
                let data = doc.data();
                let userName = data.userName || "UNKNOWN";
                let userId = data.userId || userName; 
                let rawTrack = data.track || ""; // Orijinal oyun kodu (ks_monza)
                let trackFormatted = formatTrackName(data.track);
                let rawCar = data.carModel || "";
                let carFormatted = formatCarName(data.carModel) || "VEHICLE";
                let bestTime = data.bestTime || "--:--.---";
                
                let timeMs = timeToMs(bestTime);

                if (timeMs !== Infinity && timeMs > 0 && bestTime !== "--:--.---") { 
                    let key = `${userId}_${rawTrack}_${rawCar}`;

                    if (!uniqueMap.has(key)) {
                        uniqueMap.set(key, { userName, rawTrack, trackFormatted, rawCar, carFormatted, bestTime, timeMs });
                    } else {
                        if (timeMs < uniqueMap.get(key).timeMs) {
                            uniqueMap.set(key, { userName, rawTrack, trackFormatted, rawCar, carFormatted, bestTime, timeMs });
                        }
                    }
                }
            });
            
            allRecords = Array.from(uniqueMap.values());
            applyFilterAndRender();
        });

        // 📡 2. DİNLEYİCİ: YÖNETİCİ AYARLARI (Settings)
        const settingsRef = doc(db, "settings", "general");
        onSnapshot(settingsRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                // Admin bir pist seçmiş mi kontrol et, yoksa ALL yap
                currentAdminTrack = data.activeLeaderboardTrack || "ALL";
            } else {
                currentAdminTrack = "ALL";
            }
            // Ayar değiştiği anda ekranı güncelle!
            applyFilterAndRender();
        });

    </script>
</body>
</html>
